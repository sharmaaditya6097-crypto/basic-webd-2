<!DOCTYPE html>
<html lang="en">
<head>

<style>
    body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fcfcfc,#ACB6E5);
    margin: 10px;
    padding:10px;
}

.container{
    width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input[type="text"],
input[type="email"],
select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

input[type="radio"],
input[type="checkbox"]{
    margin-right:5px;
}

label{
    font-weight:bold;
}

button,
input[type="submit"]{
    background:#343f50;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover,
input[type="submit"]:hover{
    background:#1a5edb;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.search-box input{
    flex:1;
}

h2{
    text-align:center;
}
</style>
